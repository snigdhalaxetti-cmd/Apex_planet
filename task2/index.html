<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Task 2 - Advanced Contact Form & ToDo App</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<nav>
    <h2>ApexPlanet Task 2</h2>
    <ul>
        <li><a href="#contact">Contact</a></li>
        <li><a href="#skills">Skills</a></li>
        <li><a href="#todo">To-Do</a></li>
    </ul>
</nav>

<header class="hero">
    <h1>Intermediate HTML, CSS & JavaScript</h1>
    <p>Responsive Design, Form Validation & Dynamic To-Do List</p>
</header>

<section id="contact" class="card">
    <h2>Contact Form</h2>

    <form id="contactForm">

        <input type="text" id="name" placeholder="Full Name">

        <input type="email" id="email" placeholder="Email Address">

        <textarea id="message"
        placeholder="Your Message"></textarea>

        <button type="submit">Submit</button>

    </form>

    <p id="formResult"></p>
</section>

<section id="skills">

<h2>Skills Grid</h2>

<div class="grid-container">

<div class="grid-item">HTML5</div>
<div class="grid-item">CSS3</div>
<div class="grid-item">JavaScript</div>
<div class="grid-item">Flexbox</div>
<div class="grid-item">CSS Grid</div>
<div class="grid-item">Responsive Design</div>

</div>

</section>

<section id="todo" class="card">

<h2>To-Do List</h2>

<div class="todo-input">

<input type="text"
id="taskInput"
placeholder="Enter Task">

<button onclick="addTask()">
Add Task
</button>

</div>

<ul id="taskList"></ul>

</section>

<footer>
    <p>Created for ApexPlanet Internship Task 2</p>
</footer>

<script src="script.js"></script>

</body>
</html>
